# docker-compose.app.yml
# 使用 Docker Hub 镜像部署（仅应用，外部数据库）
# 适合：已有 PostgreSQL 实例，将 DATABASE_URL 填入 .env
#
# 启动：IMAGE_TAG=1.0.0 docker compose -f docker-compose.app.yml up -d
# 更新：IMAGE_TAG=1.1.0 docker compose -f docker-compose.app.yml pull && docker compose -f docker-compose.app.yml up -d
# 不指定 IMAGE_TAG 时默认使用 latest

services:
  app:
    image: touwaeriol/sub2apipay:${IMAGE_TAG:-latest}
    ports:
      - '${APP_PORT:-3456}:3456'
    env_file: .env
    volumes:
      # 宿主机 uploads 目录挂载到 Next.js public/uploads，可通过 /uploads/* 访问
      - ./uploads:/app/public/uploads:ro
    restart: unless-stopped
